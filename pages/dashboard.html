<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои питомцы — ВетКлиника</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EE;
  --text: #1a1a1a; --text-muted: #6b7280; --text-hint: #9ca3af;
  --bg: #f5f5f4; --bg-card: #ffffff;
  --border: rgba(0,0,0,0.1); --border-hover: rgba(0,0,0,0.2);
  --radius-md: 8px; --radius-lg: 12px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.5; }

.btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; background: var(--green); color: white; border: none; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-primary:hover { background: var(--green-dark); }
.icon-btn { border: 0.5px solid var(--border); background: none; border-radius: var(--radius-md); padding: 5px 10px; cursor: pointer; font-size: 14px; color: var(--text-muted); }
.icon-btn:hover { background: var(--bg); border-color: var(--border-hover); }
.icon-btn.danger:hover { color: #a32d2d; border-color: #f09595; background: #fcebeb; }

.badge { font-size: 13px; padding: 3px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.badge-done { background: #eaf3de; color: #3b6d11; }
.badge-soon { background: #faeeda; color: #854f0b; }
.badge-next { background: #e6f1fb; color: #185fa5; }

.card { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 12px; }

.form-field { margin-bottom: 12px; }
.form-label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
.form-input { width: 100%; padding: 8px 12px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); font-size: 15px; background: white; color: var(--text); outline: none; }
.form-input:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(29,158,117,.15); }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

#error-msg { display: none; background: #fcebeb; color: #a32d2d; border: 0.5px solid #f09595; border-radius: var(--radius-md); padding: 10px 16px; font-size: 15px; margin-bottom: 16px; }

.header { background: var(--bg-card); border-bottom: 0.5px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 5; }
.logo { font-size: 16px; font-weight: 500; }
.logo span { color: var(--green); }
.header-right { display: flex; align-items: center; gap: 12px; }
#user-email { font-size: 14px; color: var(--text-muted); }
.btn-logout { background: none; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); padding: 5px 12px; font-size: 14px; cursor: pointer; color: var(--text-muted); }
.btn-logout:hover { background: var(--bg); color: var(--text); }

.nav { background: var(--bg-card); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; padding: 0 24px; }
.nav-btn { padding: 13px 16px; font-size: 13px; border: none; background: none; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; text-decoration: none; display: inline-flex; align-items: center; }
.nav-btn.active { color: var(--green); border-bottom-color: var(--green); font-weight: 500; }

.content { max-width: 760px; margin: 0 auto; padding: 20px 16px 24px; }

.pet-row { display: flex; align-items: flex-start; gap: 16px; }
.pet-icon { 
  width: 80px; height: 80px; 
  border-radius: 12px; 
  background: var(--bg); 
  display: flex; align-items: center; justify-content: center; 
  font-size: 36px; flex-shrink: 0; 
}
.pet-icon-photo { background-size: cover; background-position: center; background-repeat: no-repeat; }
.pet-info { flex: 1; min-width: 0; }
.pet-name { font-size: 22px; font-weight: 600; }
.pet-meta { font-size: 15px; color: var(--text-muted); margin-top: 3px; }
.pet-actions { display: flex; gap: 6px; flex-shrink: 0; }
    
.pet-info { flex: 1; min-width: 0; }
.pet-name { font-size: 19px; font-weight: 500; }
.pet-meta { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
.pet-actions { display: flex; gap: 6px; flex-shrink: 0; }

.vaccine-list { margin-top: 14px; border-top: 0.5px solid var(--border); padding-top: 12px; }
.vaccine-section-title { font-size: 14px; font-weight: 500; color: var(--text-hint); letter-spacing: .05em; margin-bottom: 8px; text-transform: uppercase; }
.no-vaccines { margin-top: 14px; font-size: 14px; color: var(--text-hint); }

.vac-row-desktop { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 6px; padding: 6px 0; border-bottom: 0.5px solid var(--border); align-items: center; }
.vac-row-desktop:last-of-type { border-bottom: none; }

.vac-row-mobile { display: none; padding: 14px 0; border-bottom: 0.5px solid var(--border); }
.vac-row-mobile:last-of-type { border-bottom: none; }
.vac-mobile-name { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
.vac-mobile-dates { display: flex; align-items: center; justify-content: space-between; gap: 9px; }
.vac-mobile-done { font-size: 14px; color: #374151; }
.vac-mobile-next { font-size: 14px; }
.vac-badge-mobile { font-size: 14px; padding: 3px 9px; }
.vac-arrow { font-size: 14px; }

.empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); font-size: 16px; background: var(--bg-card); border-radius: var(--radius-lg); border: 0.5px dashed var(--border-hover); }

#modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); align-items: flex-start; justify-content: center; z-index: 50; padding: 24px 16px; overflow-y: auto; }
.modal { background: var(--bg-card); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 24px; width: 100%; max-width: 560px; margin: auto; }
.modal-title { font-size: 16px; font-weight: 500; margin-bottom: 18px; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.btn-save { flex: 1; padding: 10px; background: var(--green); color: white; border: none; border-radius: var(--radius-md); font-size: 15px; font-weight: 500; cursor: pointer; }
.btn-save:hover { background: var(--green-dark); }
.btn-save:disabled { opacity: .6; cursor: not-allowed; }
.btn-cancel { flex: 1; padding: 10px; background: none; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); font-size: 13px; cursor: pointer; color: var(--text-muted); }
.btn-cancel:hover { background: var(--bg); }

.section-divider { border: none; border-top: 0.5px solid var(--border); margin: 16px 0; }
.vaccines-label { font-size: 13px; font-weight: 500; color: var(--text-hint); letter-spacing: .05em; margin-bottom: 8px; text-transform: uppercase; }
.vaccine-form-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 8px; align-items: end; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 0.5px solid var(--border); }
.vaccine-form-row:last-child { border-bottom: none; }
.del-vac-btn { padding: 8px 10px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: none; cursor: pointer; color: var(--text-muted); font-size: 15px; line-height: 1; align-self: flex-end; }
.del-vac-btn:hover { background: #fcebeb; color: #a32d2d; border-color: #f09595; }
.add-vaccine-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 9px; background: none; border: 0.5px dashed var(--border-hover); border-radius: var(--radius-md); font-size: 14px; color: var(--text-muted); cursor: pointer; margin-top: 4px; }
.add-vaccine-btn:hover { background: var(--bg); }

/* Фото */
.photo-upload-area { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
.photo-preview-wrap { flex-shrink: 0; }
#photo-preview { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 0.5px solid var(--border); display: none; }
.photo-placeholder { width: 72px; height: 72px; border-radius: 50%; background: var(--bg); border: 0.5px dashed var(--border-hover); display: flex; align-items: center; justify-content: center; font-size: 28px; }
.photo-upload-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); cursor: pointer; font-size: 13px; color: var(--text-muted); background: none; }
.photo-upload-btn:hover { background: var(--bg); }
#photo-input { display: none; }

#loading-screen { position: fixed; inset: 0; background: #f5f5f4; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #6b7280; z-index: 100; }

.mobile-nav { display: none; }
.burger-menu { display: none; }
@media (max-width: 600px) {
  .nav { display: none; }
  .mobile-nav { display: flex; align-items: center; gap: 12px; background: white; border-bottom: 0.5px solid var(--border); padding: 10px 16px; }
  .burger { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); padding: 0; }
  .burger-menu { background: white; border-bottom: 0.5px solid var(--border); flex-direction: column; }
  .burger-menu.open { display: flex; }
  .burger-menu a { padding: 14px 20px; font-size: 16px; color: var(--text); text-decoration: none; border-bottom: 0.5px solid var(--border); }
  .burger-menu a:last-child { border-bottom: none; }
  .vac-row-desktop { display: none; }
  .vac-row-mobile { display: block; }
  .header { padding: 12px 16px; }
  .header .logo { display: none; }
  #user-email { display: none; }
  .content { padding: 12px 12px 24px; }
  .pet-name { font-size: 18px; }
  .pet-meta { font-size: 13px; }
  .pet-actions { width: 100%; justify-content: flex-end; margin-top: 6px; }
  .pet-row { flex-wrap: wrap; }
  .pet-icon { width: 70px; height: 70px; font-size: 30px; border-radius: 10px; }
  #modal-overlay { padding: 12px 8px; }
  .modal { padding: 16px; }
  .form-grid-2, .form-grid-3 { grid-template-columns: 1fr; }
  .vaccine-form-row { grid-template-columns: 1fr 1fr; }
  .vaccine-form-row .form-field:first-child { grid-column: span 2; }
  .del-vac-btn { grid-column: span 2; width: 100%; }
  .vaccine-section-title { font-size: 13px; margin-bottom: 4px; }
  .vaccine-list { padding-top: 16px; }
}
@media (max-width: 400px) {
  .pet-icon { width: 44px; height: 44px; font-size: 20px; }
}
  </style>
</head>
<body>
<div id="loading-screen">Загрузка...</div>
<div id="app" style="display:none">
  <header class="header">
    <div class="logo"><span>🐾</span> ВетКлиника</div>
    <div class="header-right">
      <span id="user-email"></span>
      <button class="btn-logout" onclick="Auth.logout()">Выйти</button>
    </div>
  </header>

  <nav class="nav">
    <a class="nav-btn active" href="dashboard.html">Мои питомцы</a>
    <a class="nav-btn" href="calendar.html">Календарь</a>
    <a class="nav-btn" href="info.html">Полезное</a>
    <button class="btn-primary" id="btn-add-pet" style="margin:6px 0 6px auto">+ Добавить питомца</button>
  </nav>

  <div class="mobile-nav" id="mobile-nav">
    <button class="burger" id="burger-btn" onclick="toggleMenu()">☰</button>
    <button class="btn-primary" id="btn-add-pet-m" style="margin-left:auto;padding:7px 12px;font-size:12px">+ Добавить питомца</button>
  </div>
  <div class="burger-menu" id="burger-menu">
    <a href="dashboard.html">Мои питомцы</a>
    <a href="calendar.html">Календарь</a>
    <a href="info.html">Полезное</a>
  </div>

  <main class="content">
    <div id="error-msg"></div>
    <div id="pets-container"><div class="empty-state">Загрузка...</div></div>
  </main>
</div>

<div id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Новый питомец</div>

    <!-- Фото -->
    <div class="photo-upload-area">
      <div class="photo-preview-wrap">
        <img id="photo-preview" alt="Фото питомца">
        <div class="photo-placeholder" id="photo-placeholder">🐾</div>
      </div>
      <div>
        <label class="photo-upload-btn" for="photo-input">📷 Загрузить фото</label>
        <input type="file" id="photo-input" accept="image/*" onchange="previewPhoto(this)">
        <div style="font-size:12px;color:var(--text-hint);margin-top:4px">JPG, PNG до 5 МБ</div>
      </div>
    </div>

    <div class="form-grid-2">
      <div class="form-field"><label class="form-label">Кличка *</label><input class="form-input" id="f-name" placeholder="Барон, Луна..."></div>
      <div class="form-field"><label class="form-label">Вид *</label><select class="form-input" id="f-type"><option>Собака</option><option>Кошка</option><option>Другое</option></select></div>
    </div>
    <div class="form-grid-3">
      <div class="form-field"><label class="form-label">Порода</label><input class="form-input" id="f-breed" placeholder="Лабрадор..."></div>
      <div class="form-field"><label class="form-label">Дата рождения</label><input class="form-input" type="date" id="f-birth"></div>
      <div class="form-field"><label class="form-label">Пол</label><select class="form-input" id="f-sex"><option>Самец</option><option>Самка</option></select></div>
    </div>
    <div class="form-field"><label class="form-label">Заметки</label><input class="form-input" id="f-notes" placeholder="Аллергии, особенности..."></div>
    <hr class="section-divider">
    <div class="vaccines-label">ПРИВИВКИ</div>
    <div id="vaccine-inputs"></div>
    <button class="add-vaccine-btn" onclick="addVaccine()">+ Добавить прививку</button>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">Отмена</button>
      <button class="btn-save" id="btn-save">Сохранить</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
  Auth.init().then(user => {
    document.getElementById('loading-screen').style.display = 'none';
    if (!user) { window.location.href = 'login.html'; return; }
    document.getElementById('app').style.display = 'block';
  });

  // Бургер меню
  function toggleMenu() {
    document.getElementById('burger-menu').classList.toggle('open');
  }
  document.addEventListener('click', e => {
    if (!e.target.closest('#burger-btn') && !e.target.closest('#burger-menu')) {
      document.getElementById('burger-menu').classList.remove('open');
    }
  });
  document.getElementById('btn-add-pet-m').addEventListener('click', () => openCreateModal());

  // Показать/скрыть placeholder фото
  window.previewPhoto = function(input) {
    const file = input.files[0];
    if (!file) return;
    const preview = document.getElementById('photo-preview');
    const placeholder = document.getElementById('photo-placeholder');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    placeholder.style.display = 'none';
  };
</script>
</body>
</html>
